<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>.me — Docs</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/this.gui@1.4.6/dist/styles.css" />
  <script>
    (function () {
      try {
        var stored = localStorage.getItem("this.gui:themeMode");
        var prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
        var isDark = stored ? stored === "dark" : prefersDark;
        document.documentElement.classList.toggle("theme-dark", isDark);
        document.documentElement.classList.toggle("theme-light", !isDark);
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <div id="root"></div>

  <script src="https://cdn.jsdelivr.net/npm/react@18.3.1/umd/react.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/this.me@latest/dist/me.umd.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/this.gui@1.4.6/dist/this.gui.umd.js"></script>

  <script>
    (function () {
      var DOCS = [
        {
          title: ".me",
          description: "The core identity primitive. One object, infinite derivations.",
          href: "./me.html",
          icon: "person"
        },
        {
          title: "Architecture",
          description: "O(k) Semantic Kernel — Infinite Proxy Chaining with inline Path Algebra.",
          href: "./Architecture.html",
          icon: "schema"
        },
        {
          title: "Syntax",
          description: "The me:// URI scheme and grammar specification for semantic paths.",
          href: "./Syntax.html",
          icon: "code"
        },
        {
          title: "Robots That Understand Context",
          description: "The same object means different things depending on who is looking and where.",
          href: "./Robots-That-Understand-Context.html",
          icon: "smart_toy"
        },
        {
          title: "Smart Cities",
          description: "A city that behaves like a living semantic system — one reactive graph.",
          href: "./Smart-Cities.html",
          icon: "location_city"
        }
      ];

      function buildDocCard(doc) {
        return {
          type: "Card",
          props: {
            variant: "outlined",
            sx: {
              cursor: "pointer",
              transition: "box-shadow 120ms ease, border-color 120ms ease",
              "&:hover": {
                boxShadow: 3,
                borderColor: "primary.main"
              }
            },
            component: "a",
            href: doc.href
          },
          children: [
            {
              type: "CardContent",
              children: [
                {
                  type: "Box",
                  props: { sx: { display: "flex", alignItems: "center", gap: 1.5, mb: 1 } },
                  children: [
                    {
                      type: "Icon",
                      props: { name: doc.icon, iconColor: "primary", fontSize: "medium" }
                    },
                    {
                      type: "Typography",
                      props: { variant: "h6", sx: { fontWeight: 700, lineHeight: 1.2 } },
                      children: [doc.title]
                    }
                  ]
                },
                {
                  type: "Typography",
                  props: { variant: "body2", color: "text.secondary" },
                  children: [doc.description]
                }
              ]
            }
          ]
        };
      }

      function buildAppSpec() {
        return {
          type: "Layout",
          props: {
            topBarConfig: {
              title: ".me",
              subtitle: "Documentation"
            },
            leftSidebarConfig: {
              initialView: "rail",
              elements: [
                { key: "home", type: "link", props: { label: "Home", icon: "home", href: "https://neurons-me.github.io/" } },
                { key: "docs", type: "link", props: { label: "Docs", icon: "description", href: "./index.html" } },
                { key: "npm", type: "link", props: { label: "npm", icon: "code", href: "https://www.npmjs.com/package/this.me" } }
              ],
              footerElements: [
                { key: "theme-toggle", type: "action", props: { label: "Theme", icon: "dark_mode", action: "__meToggleTheme" } }
              ]
            },
            rightSidebarConfig: false,
            footerConfig: false
          },
          children: [
            {
              type: "Box",
              props: { sx: { p: { xs: 2, sm: 4 }, maxWidth: 960, mx: "auto", width: "100%" } },
              children: [
                {
                  type: "Typography",
                  props: { variant: "h4", sx: { fontWeight: 800, mb: 0.5 } },
                  children: [".me Docs"]
                },
                {
                  type: "Typography",
                  props: { variant: "body1", color: "text.secondary", sx: { mb: 4 } },
                  children: ["A declarative semantic identity system. Human owns meaning. Everything else asks."]
                },
                {
                  type: "Box",
                  props: {
                    sx: {
                      display: "grid",
                      gridTemplateColumns: { xs: "1fr", sm: "1fr 1fr", md: "1fr 1fr 1fr" },
                      gap: 2
                    }
                  },
                  children: DOCS.map(buildDocCard)
                }
              ]
            }
          ]
        };
      }

      function initGui() {
        var GUI = window.GUI;
        if (!GUI || typeof GUI.mount !== "function") {
          console.warn(".GUI not ready");
          return;
        }

        var MeGlobal = window.Me || window.me || window.thisMe;
        var me = null;
        if (MeGlobal) {
          try {
            var MeCtor = MeGlobal.ME || MeGlobal.Me || MeGlobal.default || MeGlobal;
            if (typeof MeCtor === "function") me = new MeCtor();
          } catch (e) {}
        }

        var runtime = me && GUI.RunMe ? GUI.RunMe(me) : null;

        window.__meToggleTheme = function () {
          try {
            var current = localStorage.getItem("this.gui:themeMode") || "light";
            var next = current === "dark" ? "light" : "dark";
            localStorage.setItem("this.gui:themeMode", next);
            document.documentElement.classList.toggle("theme-dark", next === "dark");
            document.documentElement.classList.toggle("theme-light", next !== "dark");
            window.dispatchEvent(new CustomEvent("this.gui:themeMode:changed", { detail: { mode: next } }));
          } catch (e) {}
        };

        var root = document.getElementById("root");
        GUI.mount(buildAppSpec(), root, { runtime: runtime, showUnknown: true });
      }

      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", initGui);
      } else {
        initGui();
      }
    })();
  </script>
</body>
</html>
