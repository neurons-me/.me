<!doctype html>
<html lang="{{ page.lang | default: site.lang | default: 'en' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title | escape }}</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #ffffff;
      --fg: #24292f;
      --muted: #57606a;
      --border: #d0d7de;
      --subtle: #f6f8fa;
      --accent: #0969da;
      --code-bg: rgba(175, 184, 193, 0.2);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0d1117;
        --fg: #c9d1d9;
        --muted: #8b949e;
        --border: #30363d;
        --subtle: #161b22;
        --accent: #58a6ff;
        --code-bg: rgba(110, 118, 129, 0.4);
      }
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans",
        Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
      font-size: 16px;
      line-height: 1.5;
    }

    .markdown-body {
      max-width: 980px;
      margin: 0 auto;
      padding: 32px;
    }

    .markdown-body > :first-child {
      margin-top: 0;
    }

    .markdown-body > :last-child {
      margin-bottom: 0;
    }

    h1,
    h2,
    h3,
    h4,
    h5,
    h6 {
      margin: 24px 0 16px;
      font-weight: 600;
      line-height: 1.25;
    }

    h1,
    h2 {
      padding-bottom: 0.3em;
      border-bottom: 1px solid var(--border);
    }

    h1 {
      font-size: 2em;
    }

    h2 {
      font-size: 1.5em;
    }

    h3 {
      font-size: 1.25em;
    }

    p,
    blockquote,
    ul,
    ol,
    dl,
    table,
    pre,
    details {
      margin-top: 0;
      margin-bottom: 16px;
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    img {
      max-width: 100%;
      height: auto;
    }

    hr {
      height: 0.25em;
      padding: 0;
      margin: 24px 0;
      background-color: var(--border);
      border: 0;
    }

    blockquote {
      padding: 0 1em;
      color: var(--muted);
      border-left: 0.25em solid var(--border);
    }

    code,
    kbd,
    pre,
    samp {
      font-family: ui-monospace, SFMono-Regular, SFMono, Consolas,
        "Liberation Mono", Menlo, monospace;
      font-size: 85%;
    }

    code {
      padding: 0.2em 0.4em;
      background-color: var(--code-bg);
      border-radius: 6px;
    }

    pre {
      padding: 16px;
      overflow: auto;
      background-color: var(--subtle);
      border-radius: 6px;
    }

    pre code {
      display: inline;
      padding: 0;
      overflow: visible;
      font-size: 100%;
      line-height: inherit;
      background: transparent;
      border: 0;
    }

    table {
      display: block;
      width: max-content;
      max-width: 100%;
      overflow: auto;
      border-spacing: 0;
      border-collapse: collapse;
    }

    th,
    td {
      padding: 6px 13px;
      border: 1px solid var(--border);
    }

    tr {
      background-color: var(--bg);
      border-top: 1px solid var(--border);
    }

    tr:nth-child(2n) {
      background-color: var(--subtle);
    }

    @media (max-width: 767px) {
      .markdown-body {
        padding: 24px 16px;
      }
    }
  </style>
</head>
<body>
  <main class="markdown-body">
    {{ content }}
  </main>
</body>
</html>
