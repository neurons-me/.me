title: .me
description: Own your knowledge graph.
url: https://neurons-me.github.io
baseurl: "/.me"

remote_theme: neurons-me/neurons-me

plugins:
  - jekyll-remote-theme

exclude:
  - Typescript
  - Python
  - Rust
  - node_modules
  - "*/node_modules"
  - vendor

markdown: kramdown
kramdown:
  input: GFM
  parse_block_html: true
  hard_wrap: false
